<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title></title>
    <link href="css/bootstrap.min.css" rel="stylesheet" />
    <link href="css/style.css" rel="stylesheet" />
</head>

<body>
    <div id="root" style="height:100%;">
        <div class="app-body">
            <div class="header">
                <h1>Менеджер задач</h1>
                <button type="button" class="btn">Выход</button>
            </div>
            <div class="container centered">
                <div>
                    <div class="mb-3">
                        <h1 class="text-center">Редактирование</h1>
                    </div>
                    <div class="mb-3">
                        <label for="base-input-name" class="form-label">Название задачи</label>
                        <input id="base-input-name" type="text" class="form-control" placeholder="Моя задача">
                    </div>
                    <div class="mb-3">
                        <label for="base-input-deadline" class="form-label">Дедлайн</label>
                        <input id="base-input-deadline" type="text" class="form-control" placeholder="01.01.2025">
                    </div>
                    <div class="mb-4">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="checkbox-important-task">
                            <label class="form-check-label" for="checkbox-important-task">Важная задача</label>
                        </div>
                    </div>
                    <div class="row">
                        <div class="col">
                            <div class="text-center">
                                <button type="button" class="btn btn-secondary w-100">Отмена</button>
                            </div>
                        </div>
                        <div class="col">
                            <div class="text-center">
                                <button type="button" class="btn btn-primary w-100">Сохранить</button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="js/bootstrap.bundle.min.js"></script>
    <script src="js/edit.js"></script>
</body>

</html>
